<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>toss 축제지도</title>
    <!-- Toss Standard Colors & Meta -->
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <script type="module" crossorigin src="./index.js"></script>
  <link rel="stylesheet" crossorigin href="./index.css">
</head>
<body>
    <div class="app-container">
        <!-- Header: Toss environments usually have their own, but we keep a subtle one for standalone/web views -->
        <header class="header" id="app-header">
            <div class="app-title">축제지도</div>
            <div id="user-key-display" style="font-size: 10px; color: #adb5bd;"></div>
        </header>

        <main>
            <!-- Hero Section -->
            <section class="section hero-section">
                <h1 class="hero-title">어떤 축제를<br>찾으시나요?</h1>
                
                <div class="card filter-card">
                    <div class="filter-row">
                        <div class="label-group">
                            <span class="label-title">지역</span>
                            <span class="label-sub" id="current-area-label">전국</span>
                        </div>
                        <div class="input-wrapper">
                            <select id="area-select">
                                <option value="">전국</option>
                                <option value="1">서울</option>
                                <option value="2">인천</option>
                                <option value="3">대전</option>
                                <option value="4">대구</option>
                                <option value="5">광주</option>
                                <option value="6">부산</option>
                                <option value="7">울산</option>
                                <option value="8">세종</option>
                                <option value="31">경기</option>
                                <option value="32">강원</option>
                                <option value="33">충북</option>
                                <option value="34">충남</option>
                                <option value="35">경북</option>
                                <option value="36">경남</option>
                                <option value="37">전북</option>
                                <option value="38">전남</option>
                                <option value="39">제주</option>
                            </select>
                        </div>
                    </div>

                    <div class="filter-row">
                        <div class="label-group">
                            <div style="display: flex; align-items: center; gap: 6px;">
                                <span class="label-title">날짜</span>
                                <button id="today-btn" class="btn-text">오늘로</button>
                            </div>
                            <span class="label-sub" id="current-date-label">오늘</span>
                        </div>
                        <div class="input-wrapper">
                            <input type="date" id="date-input">
                        </div>
                    </div>

                    <div class="btn-group">
                        <button id="search-btn" class="btn btn-primary" style="flex: 2;">축제 찾아보기</button>
                        <button id="nearby-btn" class="btn btn-secondary" style="flex: 1;">내 주변</button>
                    </div>
                </div>
            </section>

            <!-- Recommendations -->
            <section class="recommend-section">
                <div class="section-header">
                    <h2>요즘 인기 있는 축제</h2>
                </div>
                <div class="recommend-slider" id="recommendation-list">
                    <div class="loader-container"><div class="spinner"></div></div>
                </div>
            </section>

            <!-- Result List Section -->
            <section class="result-section">
                <div class="list-header">
                    <h2>축제 목록</h2>
                    <span class="result-count" id="result-count">검색해 보세요</span>
                </div>

                <div id="loader" class="loader-container" style="display: none;">
                    <div class="spinner"></div>
                    <p style="color:var(--color-text-tertiary); font-size:14px;">정보를 가져오고 있어요</p>
                </div>

                <div id="festival-list">
                    <div class="empty-state">
                        <span class="icon">🔍</span>
                        <p class="msg">궁금한 지역이나 날짜를 선택하고<br>축제를 찾아보세요.</p>
                    </div>
                </div>
            </section>
        </main>

        <!-- Bottom Sheet (Detail View) -->
        <div class="bottom-sheet-overlay" id="detail-overlay"></div>
        <div class="bottom-sheet" id="festival-detail">
            <div class="sheet-header">
                <div class="drag-handle"></div>
                <button class="sheet-close" id="close-detail">✕</button>
            </div>
            
            <div id="detail-content-area">
                <!-- Content will be injected -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
</body>
</html>
